name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel older runs on the same branch when a new commit lands.
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22.x]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          # No `cache: npm` — source-jira has zero dependencies and no
          # lockfile; setup-node would refuse to set up the cache.

      - name: Install
        run: npm ci || npm install

      - name: Run tests
        run: npm test

  # Aggregator job so branch protection has a single required check
  # regardless of how the matrix grows.
  test-required:
    name: test (required)
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all matrix jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more matrix jobs failed."
            exit 1
          fi
